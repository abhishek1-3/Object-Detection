services:
  - type: web
    name: object-detection
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip uninstall -y opencv-python && pip install "opencv-python-headless>=4.8,<5" && python -c "from ultralytics import YOLO; YOLO('yolov8n.pt')"
    startCommand: gunicorn --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MODEL_PATH
        value: yolov8n.pt
