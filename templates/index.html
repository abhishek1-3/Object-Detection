<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Object Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="card-title mb-4">Object Detection Website</h1>
          <p class="lead">Upload an image to detect objects, or use the webcam live stream.</p>
          <form method="POST" action="/detect" enctype="multipart/form-data" class="mb-4">
            <div class="mb-3">
              <label for="image" class="form-label">Upload image</label>
              <input class="form-control" type="file" id="image" name="image" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-primary">Detect Objects</button>
          </form>
          {% if filename %}
          <div class="mb-4">
            <h5>Result</h5>
            <img src="{{ url_for('static', filename='uploads/' + filename) }}" class="img-fluid rounded" alt="Detected Image">
          </div>
          {% endif %}
          <a href="/webcam" class="btn btn-success">Open Webcam Stream</a>
        </div>
      </div>
    </div>
  </body>
</html>
