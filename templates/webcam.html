<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Webcam Object Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .video-card {
        max-width: 100%;
        overflow: hidden;
      }
      img {
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm video-card">
        <div class="card-body">
          <h1 class="card-title mb-4">Live Webcam Object Detection</h1>
          {% if camera_available %}
          <div class="mb-3">
            <img src="{{ url_for('video_feed') }}" alt="Webcam Stream">
          </div>
          {% else %}
          <div class="alert alert-warning">
            <strong>Webcam not available.</strong> Please check your camera connection.
          </div>
          {% endif %}
          <a href="/" class="btn btn-secondary">Back to Image Upload</a>
        </div>
      </div>
    </div>
  </body>
</html>
